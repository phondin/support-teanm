<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Nguyen Dinh Phong</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    background:#f4f6f9;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    color:#333;
}

/* NAVBAR */
nav{
    text-align:center;
    padding:12px 0;
    background:#eaeaea;
}

nav a{
    margin:0 15px;
    text-decoration:none;
    color:#555;
    font-weight:500;
}

nav a.active{
    color:#16a085;
    border-bottom:2px solid #16a085;
    padding-bottom:2px;
}

/* HEADER */
.header{
    text-align:center;
    padding:20px 0;
}

.header h1{
    font-size:30px;
    font-weight:600;
}

.header h2{
    color:#16a085;
    font-size:18px;
    margin-top:5px;
}

.header p{
    font-size:14px;
    margin-top:8px;
    color:#666;
}

/* MAIN CONTENT */
.container{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px;
    padding:0 20px;
}

/* CARD */
.card{
    flex:1;
    max-width:480px;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

/* INFO */
.info-item{
    margin-bottom:15px;
}

.info-item h3{
    font-size:15px;
    color:#16a085;
}

.info-item p{
    font-size:14px;
}

/* MAP */
.map iframe{
    width:100%;
    height:150px;
    border:none;
    border-radius:8px;
}

/* FORM */
.form-group{
    margin-bottom:12px;
}

.form-group label{
    font-size:13px;
}

.form-group input,
.form-group textarea{
    width:100%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:13px;
}

.form-group textarea{
    height:70px;
    resize:none;
}

button{
    width:100%;
    padding:9px;
    background:#16a085;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
}

button:hover{
    background:#138d75;
}

/* MOBILE */
@media(max-width:900px){
    body{
        overflow:auto;
        height:auto;
    }
    .container{
        flex-direction:column;
        margin-bottom:20px;
    }
}
</style>
</head>

<body>

<nav>
    <a href="#">Home</a>
    <a href="#" class="active">Contact</a>
</nav>

<div class="header">
    <h1>Nguyen Dinh Phong</h1>
    <h2>Contact</h2>
    <p>Feel free to reach out to me via email for collaborations or inquiries.</p>
</div>

<div class="container">

    <!-- LEFT -->
    <div class="card">
        <div class="info-item">
            <h3>Address</h3>
            <p>12/4 Hoang Hoa Tham, Binh Thanh, Vietnam</p>
        </div>

        <div class="info-item">
            <h3>Email</h3>
            <p>nguyendinhphong1518@gmail.com</p>
        </div>

        <div class="map">
            <iframe 
            src="https://www.google.com/maps?q=12/4%20Hoang%20Hoa%20Tham,%20Binh%20Thanh,%20Vietnam&output=embed">
            </iframe>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="card">
        <form>
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" required>
            </div>

            <div class="form-group">
                <label>Your Email</label>
                <input type="email" required>
            </div>

            <div class="form-group">
                <label>Subject</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea required></textarea>
            </div>

            <button type="submit">Send Message</button>
        </form>
    </div>

</div>

</body>
</html>
